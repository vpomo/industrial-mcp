server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

mqtt:
  broker_url: "tcp://localhost:1883"
  client_id: "mcp_server"
  username: ""
  password: ""
  topic_prefix: "mcp/"
  qos: 0

opcua:
  endpoint: "opc.tcp://localhost:4840"
  security_mode: "None"
  cert_file: ""
  key_file: ""

license:
  enabled: false
  public_key_path: "key/public.pem"

x402:
  enabled: false
  payment_address: "0x..."

metrics:
  enabled: true
  file: "/app/logs/requests.jsonl"
  buffer_size: 1000

logging:
  level: "info"
  format: "json"