version: '3.8'

networks:
  mcp-net:
    driver: bridge

services:
  mcp-server:
    build: .
    container_name: mcp_mqtt_opcua
    hostname: mcp-server
    ports:
      - "8080:8080"
    env_file:
      - .env
    networks:
      mcp-net:
        mac_address: "02:42:ac:14:00:01"
    volumes:
      - ./cmd/server/config.yaml:/app/config.yaml:ro
      - ./cmd/server/license.dat:/app/license.dat:ro
      - ./cmd/server/key/public.pem:/app/key/public.pem:ro
      - ./docker/identity/machine-id:/etc/machine-id:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
